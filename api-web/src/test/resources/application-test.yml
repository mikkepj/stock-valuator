spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false  # Use JPA auto-DDL for tests

fmp:
  api:
    base-url: http://localhost:8089  # WireMock in integration tests
    key: test-key
    timeout-seconds: 5
    max-retries: 1

logging:
  level:
    com.nuvixtech.stockvaluator: DEBUG
