spring:
  application:
    name: stock-valuator

  # -----------------------------------------------------------
  # Database — PostgreSQL local
  # -----------------------------------------------------------
  datasource:
    url: jdbc:postgresql://localhost:5432/stockvaluator
    username: ${DB_USERNAME:sv_user}
    password: ${DB_PASSWORD:sv_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 10000

  jpa:
    hibernate:
      ddl-auto: validate  # Flyway manages the schema
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  # -----------------------------------------------------------
  # Flyway migrations
  # -----------------------------------------------------------
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # -----------------------------------------------------------
  # Cache
  # -----------------------------------------------------------
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=24h

# -----------------------------------------------------------
# FMP API configuration
# -----------------------------------------------------------
fmp:
  api:
    base-url:  https://financialmodelingprep.com/stable
    key: ${FMP_API_KEY:demo}
    timeout-seconds: 15
    max-retries: 3

# -----------------------------------------------------------
# Scheduling
# -----------------------------------------------------------
stockvaluator:
  scheduling:
    refresh-cron: "0 0 6 * * SAT"  # Every Saturday at 6 AM

# -----------------------------------------------------------
# Actuator
# -----------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# -----------------------------------------------------------
# Logging
# -----------------------------------------------------------
logging:
  level:
    com.nuvixtech.stockvaluator: DEBUG
    org.hibernate.SQL: WARN
    org.springframework.web: INFO

# -----------------------------------------------------------
# Server
# -----------------------------------------------------------
server:
  port: 8080

# -----------------------------------------------------------
# OpenAPI / Swagger
# -----------------------------------------------------------
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
